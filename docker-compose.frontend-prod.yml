services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    command: npm start
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "${FRONTEND_HOST_PORT}:3000"
    environment:
      REACT_APP_API_URL: ${REACT_APP_API_URL}
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING}
      NODE_OPTIONS: ${NODE_OPTIONS}
      GENERATE_SOURCEMAP: ${GENERATE_SOURCEMAP}
