services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_HOST_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_HOST_PORT}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      sh -c "mkdir -p /app/logs &&
             python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             python manage.py shell -c \"import os; from django.contrib.auth.models import User; admin_username = os.getenv('ADMIN_USERNAME', 'admin'); admin_email = os.getenv('ADMIN_EMAIL', 'admin@chickenmanagement.com'); admin_password = os.getenv('ADMIN_PASSWORD', 'admin123'); User.objects.get_or_create(username=admin_username, defaults={'email': admin_email, 'is_staff': True, 'is_superuser': True}); admin = User.objects.get(username=admin_username); admin.set_password(admin_password); admin.save()\" &&
             python manage.py ensure_default_program &&
             python manage.py ensure_default_farm &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "${BACKEND_HOST_PORT}:8000"
    environment:
      DJANGO_SETTINGS_MODULE: chicken_management.settings_prod
      DEBUG: ${DEBUG}
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS}
      DB_CONN_MAX_AGE: ${DB_CONN_MAX_AGE}
      DB_CONNECT_TIMEOUT: ${DB_CONNECT_TIMEOUT}
      DB_STATEMENT_TIMEOUT_MS: ${DB_STATEMENT_TIMEOUT_MS}
      DB_POOL_MODE: ${DB_POOL_MODE}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL}
      ROTEM_USERNAME: ${ROTEM_USERNAME:-}
      ROTEM_PASSWORD: ${ROTEM_PASSWORD:-}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      FRONTEND_URL: ${FRONTEND_URL}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    command: npm start
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "${FRONTEND_HOST_PORT}:3000"
    environment:
      REACT_APP_API_URL: ${REACT_APP_API_URL}
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING}
      NODE_OPTIONS: ${NODE_OPTIONS}
      GENERATE_SOURCEMAP: ${GENERATE_SOURCEMAP}
    depends_on:
      - backend

volumes:
  postgres_data:
  static_volume:
  media_volume:
